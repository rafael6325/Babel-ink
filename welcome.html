<!DOCTYPE html>
<html>
<head>
  <title>Feed de Postagens</title>
  <style>
    table {
      width: 100%;
      border-collapse: collapse;
    }
    th, td {
      padding: 15px;
      text-align: left;
      border-bottom: 1px solid #ddd;
    }
  </style>
</head>
<body>
  <h2>Feed de Postagens</h2>
  <table>
    <tr>
      <th>Nome do Usuário</th>
      <th>Postagem</th>
      <th>Data</th>
    </tr>
    <tr>
      <td>Usuário 1</td>
      <td>Esta é a primeira postagem.</td>
      <td>01/01/2022</td>
    </tr>
    <tr>
      <td>Usuário 2</td>
      <td>Esta é a segunda postagem.</td>
      <td>02/01/2022</td>
    </tr>
  </table>
</body>
</html>
